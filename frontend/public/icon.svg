<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad)"/>

  <!-- Document shape -->
  <g transform="translate(18, 12)">
    <!-- Document base -->
    <rect x="0" y="0" width="28" height="36" rx="3" fill="white"/>
    <!-- Folded corner -->
    <path d="M20 0 L28 8 L20 8 Z" fill="#e2e8f0"/>
    <!-- Chart bars -->
    <rect x="4" y="20" width="5" height="12" rx="1" fill="url(#grad)"/>
    <rect x="11" y="15" width="5" height="17" rx="1" fill="url(#grad)"/>
    <rect x="18" y="10" width="5" height="22" rx="1" fill="url(#grad)"/>
  </g>
</svg>
