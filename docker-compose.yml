services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: plataforma_inteligencia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - ./src:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: plataforma_inteligencia
      DB_USER: postgres
      DB_PASSWORD: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CHANNELS_REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: celery -A core worker -l info --pool=solo --concurrency=1
    volumes:
      - ./src:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: plataforma_inteligencia
      DB_USER: postgres
      DB_PASSWORD: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CHANNELS_REDIS_URL: redis://redis:6379/1
      # Telemetry: set OTEL_EXPORTER_OTLP_ENDPOINT to enable real traces
      OTEL_SERVICE_NAME: plataforma-inteligencia-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  celery-beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: celery -A core beat -l info -s /tmp/celerybeat-schedule
    volumes:
      - ./src:/app
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      DB_HOST: postgres
      DB_NAME: plataforma_inteligencia
      DB_USER: postgres
      DB_PASSWORD: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OTEL_SERVICE_NAME: plataforma-inteligencia-beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
  media_data:
