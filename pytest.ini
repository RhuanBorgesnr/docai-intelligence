[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = src/tests
addopts = -v --tb=short
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (may use external services)
    slow: Slow tests (AI calls, etc.)
